<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- NexusAI Logo - 绿色 Pip-Boy 风格 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="64" cy="64" r="60" fill="url(#gradient)" filter="url(#glow)" />
  
  <!-- AI 大脑图标 -->
  <path d="M44,44 Q64,30 84,44 Q94,54 84,64 Q64,78 44,64 Q34,54 44,44" 
        fill="none" stroke="#0a0a0a" stroke-width="3" />
  <circle cx="54" cy="54" r="3" fill="#0a0a0a" />
  <circle cx="74" cy="54" r="3" fill="#0a0a0a" />
  <path d="M54,64 Q64,68 74,64" fill="none" stroke="#0a0a0a" stroke-width="2" />
  
  <!-- 电路板纹理 -->
  <path d="M30,30 L38,30 M30,34 L38,34 M30,38 L38,38" 
        stroke="#0a0a0a" stroke-width="1" opacity="0.3" />
  <path d="M90,90 L98,90 M90,94 L98,94 M90,98 L98,98" 
        stroke="#0a0a0a" stroke-width="1" opacity="0.3" />
  
  <!-- 文字标识 -->
  <text x="64" y="110" text-anchor="middle" font-family="Arial" font-size="10" 
        fill="#0a0a0a" font-weight="bold">NexusAI</text>
</svg>